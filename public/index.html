<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>File Analyzer Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%22100%22>🦾</text></svg>">
    <!-- Chart.js CDN -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <!-- Moment.js for date formatting in line chart tooltips -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/moment.js/2.30.1/moment.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-moment@1.0.0/dist/chartjs-adapter-moment.min.js"></script>
</head>
<body>
    <div class="dashboard-container">
        <header class="dashboard-header">
            <h1>File Analyzer Dashboard 🦾</h1>
            <div class="theme-toggle">
                <label class="switch">
                    <input type="checkbox" id="theme-switch">
                    <span class="slider round"></span>
                </label>
                <span>Dark Mode</span>
            </div>
        </header>

        <main class="dashboard-main">
            <section class="summary-section">
                <div class="summary-card">
                    <h2>Total Disk Usage</h2>
                    <p id="total-usage">Loading...</p>
                </div>
                <div class="summary-card">
                    <h2>Total File Types</h2>
                    <p id="total-types">Loading...</p>
                </div>
            </section>

            <section class="charts-section">
                <div class="chart-card pie-chart-card">
                    <h2>File Type Distribution (Pie)</h2>
                    <canvas id="pieChart"></canvas>
                </div>
                <div class="chart-card bar-chart-card">
                    <h2>Top 10 File Type Sizes (Bar)</h2>
                    <canvas id="barChart"></canvas>
                </div>
                 <div class="chart-card donut-chart-card">
                    <h2>File Type Distribution (Donut)</h2>
                    <canvas id="donutChart"></canvas>
                </div>
                <div class="chart-card line-chart-card">
                    <h2>Size Trend Over Time</h2>
                    <canvas id="lineChart"></canvas>
                </div>
            </section>

            <section class="top-files-section">
                <h2>Top 10 Largest File Types</h2>
                <ul id="top-files-list">
                    <li>Loading...</li>
                </ul>
            </section>
        </main>

        <footer>
            <p>&copy; 2026 ClawAssist. All rights reserved.</p>
        </footer>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="script.js"></script>
</body>
</html>
